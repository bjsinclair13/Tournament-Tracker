<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sinclair Tournament Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sinclair">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDI0IDEwMjQiPjxyZWN0IHdpZHRoPSIxMDI0IiBoZWlnaHQ9IjEwMjQiIHJ4PSIyMDAiIGZpbGw9IiNmOTczMTYiLz48dGV4dCB4PSI1MTIiIHk9IjcyMCIgZm9udC1mYW1pbHk9IkFyaWFsIEJsYWNrLEdlb3JnaWEsc2VyaWYiIGZvbnQtc2l6ZT0iNzUwIiBmb250LXdlaWdodD0iOTAwIiBmaWxsPSIjMWE1ZmI0IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5TPC90ZXh0Pjwvc3ZnPg==">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#ddeaf8;--surf:#fff;--surf2:#c8ddf4;--bdr:#a0c0e8;--accent:#f97316;--blue:#1a5fb4;--navy:#0d1f4e;--text:#0f1f3d;--muted:#4a6fa8;--win:#1a5fb4;--loss:#e05a2b;}
*{box-sizing:border-box;margin:0;padding:0;}html,body{max-width:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
#splash{position:fixed;inset:0;z-index:9999;background:var(--accent);display:flex;align-items:center;justify-content:center;transition:opacity 1s ease;}
#splash.fade{opacity:0;pointer-events:none;}#splash.gone{display:none;}
.splash-word{font-family:'Dancing Script',cursive;font-size:clamp(5rem,16vw,10rem);color:var(--navy);user-select:none;}
#app{opacity:0;transition:opacity .8s ease;}#app.show{opacity:1;}
header{background:var(--blue);border-bottom:3px solid var(--accent);padding:0 1rem;}
.htop{display:flex;align-items:center;height:52px;gap:.6rem;}
.hbot{padding-bottom:.4rem;}
h1{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;letter-spacing:2px;color:#fff;white-space:nowrap;flex-shrink:0;}
.lsw{display:flex;align-items:center;gap:.4rem;flex:1;min-width:0;overflow:hidden;}
.selwrap{position:relative;flex:1;max-width:200px;min-width:0;}
#lsel{appearance:none;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:7px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.82rem;padding:.35rem 1.6rem .35rem .7rem;cursor:pointer;outline:none;width:100%;}
#lsel option{background:var(--blue);}
.sarr{position:absolute;right:.45rem;top:50%;transform:translateY(-50%);pointer-events:none;color:rgba(255,255,255,.7);font-size:.55rem;}
.tbdg{background:rgba(255,255,255,.2);border-radius:4px;padding:.1rem .4rem;font-size:.6rem;color:#fff;font-weight:700;white-space:nowrap;flex-shrink:0;}
.ibtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:7px;color:rgba(255,255,255,.8);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.88rem;transition:all .15s;flex-shrink:0;}
.ibtn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
.ibtn.del:hover{background:var(--loss);border-color:var(--loss);}
.tabbar{display:flex;gap:.2rem;flex-wrap:wrap;}
.tab{padding:.27rem .85rem;border-radius:5px 5px 0 0;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab.active{background:var(--accent);color:#fff;}
.tab:not(.active):hover{background:rgba(255,255,255,.2);color:#fff;}
.view{display:none;padding:1rem;}.view.active{display:block;}
.mbd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:1rem;}
.mbd.open{display:flex;}
.modal{background:var(--surf);border:1px solid var(--bdr);border-radius:13px;padding:1.5rem;width:100%;max-width:400px;}
.mh{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px;color:var(--accent);margin-bottom:.9rem;}
.macts{display:flex;gap:.5rem;margin-top:1rem;justify-content:flex-end;}
.frow{display:flex;gap:.4rem;margin:.3rem 0 .7rem;}
.fbtn{flex:1;padding:.4rem;border-radius:7px;border:2px solid var(--bdr);background:var(--surf2);cursor:pointer;font-size:.76rem;font-weight:600;color:var(--muted);text-align:center;transition:all .15s;}
.fbtn.on{border-color:var(--blue);color:var(--blue);background:#ddeaf8;}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:1.25rem;margin-bottom:1rem;}
.ch{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;color:var(--accent);margin-bottom:.75rem;}
.irow{display:flex;gap:.4rem;margin-bottom:.4rem;}
input[type=text]{background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:.45rem .8rem;flex:1;outline:none;transition:border-color .2s;min-width:0;}
input[type=text]:focus{border-color:var(--accent);}
.btn{padding:.46rem 1.1rem;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.83rem;cursor:pointer;transition:all .15s;}
.ba{background:var(--accent);color:#fff;}.ba:hover{background:#ea6a0a;}
.bb{background:var(--blue);color:#fff;}.bb:hover{background:#154e9a;}
.bg{background:transparent;border:1px solid var(--bdr);color:var(--muted);}.bg:hover{color:var(--text);border-color:var(--text);}
.chip{display:inline-flex;align-items:center;gap:.3rem;background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:.2rem .6rem;margin:.12rem;font-size:.8rem;}
.chip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;line-height:1;}
.chip button:hover{color:var(--loss);}
.sdlbl{font-size:.62rem;color:var(--muted);font-weight:700;margin-right:.1rem;}
.gc{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:.6rem .85rem;margin-bottom:.4rem;display:flex;align-items:center;gap:.6rem;}
.gc.done{opacity:.6;}
.gnum{font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:var(--muted);min-width:20px;flex-shrink:0;}
.mu{flex:1;display:flex;align-items:center;gap:.4rem;font-size:.82rem;font-weight:500;min-width:0;}
.tn{flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tn.w{color:var(--win);font-weight:700;}.tn.l{color:var(--muted);text-decoration:line-through;}
.gvs{color:var(--muted);font-size:.65rem;flex-shrink:0;}
.gas{display:flex;gap:.3rem;flex-shrink:0;}
.pbtn{padding:.2rem .45rem;border-radius:5px;border:1px solid var(--bdr);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.68rem;cursor:pointer;transition:all .15s;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pbtn:hover,.pbtn.sel{background:var(--win);color:#fff;border-color:var(--win);}
.stbl{width:100%;border-collapse:collapse;table-layout:fixed;}
.stbl thead th{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.8px;color:var(--muted);padding:.45rem .75rem;border-bottom:2px solid var(--bdr);white-space:nowrap;}
.stbl thead th:nth-child(1),.stbl thead th:nth-child(2){text-align:left;}
.stbl thead th:not(:nth-child(1)):not(:nth-child(2)){text-align:center;}
.stbl tbody td{padding:.65rem .75rem;border-bottom:1px solid var(--bdr);font-size:.85rem;}
.stbl tbody td:nth-child(1){text-align:center;width:40px;}
.stbl tbody td:nth-child(2){text-align:left;}
.stbl tbody td:not(:nth-child(1)):not(:nth-child(2)){text-align:center;}
.stbl tr:last-child td{border-bottom:none;}
.stbl tbody tr:hover{background:var(--surf2);}
.rk{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);}.rk.top{color:var(--accent);}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;margin-bottom:.5rem;color:var(--accent);}
.slabel{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:1px;color:var(--muted);margin:1rem 0 .4rem;}
.badge{font-size:.65rem;background:var(--surf2);border-radius:4px;padding:.05rem .3rem;color:var(--muted);}
.empty{text-align:center;color:var(--muted);padding:2.5rem;font-size:.88rem;}
.bk-section{margin-bottom:1.2rem;}
.bk-sec-lbl{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:1.5px;color:var(--blue);border-bottom:2px solid var(--bdr);padding-bottom:.25rem;margin-bottom:.5rem;}
.bk-scroll{overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:.5rem 0;}
.champ{background:linear-gradient(135deg,var(--blue),#2a7fd4);border-radius:12px;padding:1rem 1.5rem;text-align:center;color:#fff;margin-bottom:1rem;}
.champ-icon{font-size:1.6rem;}.champ-lbl{font-family:'Bebas Neue',sans-serif;font-size:.72rem;letter-spacing:3px;opacity:.7;}
.champ-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);line-height:1;}
.gf-wrap{background:var(--surf);border:2px solid var(--accent);border-radius:10px;padding:1rem;margin-bottom:1rem;}
.gf-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;color:var(--accent);margin-bottom:.75rem;}
.gf-game-lbl{font-family:'Bebas Neue',sans-serif;font-size:.7rem;color:var(--muted);letter-spacing:.5px;margin-bottom:.4rem;}
.gf-slot{display:flex;align-items:center;padding:.4rem .8rem;border:1px solid var(--bdr);border-radius:7px;margin-bottom:.3rem;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;background:var(--surf2);}
.gf-slot:hover:not(.tbd):not(.inactive){background:#d0e4f5;border-color:var(--blue);}
.gf-slot.win{background:var(--blue);color:#fff;border-color:var(--blue);}
.gf-slot.lose{background:#f0f4f9;color:#bbb;}
.gf-slot.tbd{color:#ccc;font-style:italic;cursor:default;}
.gf-slot.inactive{opacity:.45;cursor:default;}
.gf-badge{font-size:.58rem;background:rgba(0,0,0,.08);border-radius:3px;padding:.05rem .35rem;margin-left:.5rem;color:inherit;}
.win .gf-badge{background:rgba(255,255,255,.2);}
.gf-reset-note{font-size:.72rem;color:var(--accent);font-style:italic;margin:.3rem 0 .5rem;}
.bk-legend{display:flex;align-items:center;gap:1rem;margin-bottom:.6rem;flex-wrap:wrap;}
.bk-legend-item{display:flex;align-items:center;gap:.35rem;font-size:.72rem;color:var(--muted);}
.bk-legend-swatch{width:28px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,.1);}
</style>
</head>
<body>
<div id="splash"><span class="splash-word">Sinclair</span></div>
<div id="app">
<header>
  <div class="htop">
    <h1>Tournament Tracker</h1>
    <div class="lsw">
      <div class="selwrap"><select id="lsel" onchange="switchLeague(this.value)"></select><span class="sarr">&#9660;</span></div>
      <span id="tbdg" class="tbdg">RR</span>
      <button class="ibtn" onclick="openNewLeague()" title="New">&#xFF0B;</button>
      <button class="ibtn del" onclick="delLeague()" title="Delete">&#128465;</button>
    </div>
  </div>
  <div class="hbot"><div class="tabbar" id="tabbar"></div></div>
</header>
<div class="mbd" id="m-new"><div class="modal">
  <div class="mh">New League</div>
  <input type="text" id="nl-name" placeholder="League name..." style="width:100%;margin-bottom:.75rem" onkeydown="if(event.key==='Enter')confirmNew()">
  <div style="font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:.25rem">TYPE</div>
  <div class="frow"><div class="fbtn on" id="nl-rr" onclick="nlType('rr')">Round Robin</div><div class="fbtn" id="nl-br" onclick="nlType('bracket')">Bracket</div></div>
  <div id="nl-fmt" style="display:none">
    <div style="font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:.25rem">FORMAT</div>
    <div class="frow"><div class="fbtn on" id="nl-se" onclick="nlFmt('single')">Single Elim</div><div class="fbtn" id="nl-de" onclick="nlFmt('double')">Double Elim</div></div>
  </div>
  <div class="macts"><button class="btn bg" onclick="closeM('m-new')">Cancel</button><button class="btn ba" onclick="confirmNew()">Create</button></div>
</div></div>
<div class="mbd" id="m-ext"><div class="modal">
  <div class="mh">Export to Bracket</div>
  <p style="color:var(--muted);font-size:.81rem;margin-bottom:.75rem">Creates a new bracket seeded by current standings.</p>
  <input type="text" id="ext-name" style="width:100%;margin-bottom:.75rem">
  <div style="font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:.25rem">FORMAT</div>
  <div class="frow"><div class="fbtn on" id="ext-se" onclick="extFmt('single')">Single Elim</div><div class="fbtn" id="ext-de" onclick="extFmt('double')">Double Elim</div></div>
  <div class="macts"><button class="btn bg" onclick="closeM('m-ext')">Cancel</button><button class="btn bb" onclick="confirmExt()">Export &#8594;</button></div>
</div></div>
<div id="view-setup" class="view active"></div>
<div id="view-schedule" class="view"></div>
<div id="view-standings" class="view"></div>
<div id="view-bracket" class="view"></div>
</div>
<script>
'use strict';
(function(){var sp=document.getElementById('splash'),ap=document.getElementById('app');setTimeout(function(){sp.classList.add('fade');ap.classList.add('show');setTimeout(function(){sp.classList.add('gone');},1000);},2000);})();

var DB={},CID=null,_GID=1;
var _nlType=‘rr’,_nlFmt=‘single’,_extFmt=‘single’;
function L(){return DB[CID];}
function real(n){return !!(n&&n!==‘TBD’&&n!==‘BYE’);}

async function save(){
var payload=JSON.stringify({db:DB,cid:CID,gid:_GID});
try{if(window.storage){await window.storage.set(‘sinclair-tt’,payload);return;}}catch(e){}
try{localStorage.setItem(‘sinclair-tt’,payload);}catch(e){}
}
async function loadData(){
try{if(window.storage){var r=await window.storage.get(‘sinclair-tt’);if(r&&r.value){var d=JSON.parse(r.value);DB=d.db||{};CID=d.cid||null;_GID=d.gid||1;return true;}}}catch(e){}
try{var d=JSON.parse(localStorage.getItem(‘sinclair-tt’)||‘null’);if(d){DB=d.db||{};CID=d.cid||null;_GID=d.gid||1;return true;}}catch(e){}
return false;
}

function mkLeague(n,t,f){var id=‘lg’+Date.now()+(Math.random()*999|0);DB[id]={name:n||‘League’,type:t||‘rr’,format:f||‘single’,teams:[],games:[],rounds:[],bk:null};return id;}
function switchLeague(id){if(!DB[id])return;CID=id;save();refreshAll();}
function delLeague(){if(Object.keys(DB).length<=1){alert(“Can’t delete the only league.”);return;}if(!confirm(‘Delete “’+L().name+’”?’))return;delete DB[CID];CID=Object.keys(DB)[0];save();renderDrop();refreshAll();}
function openM(id){document.getElementById(id).classList.add(‘open’);}
function closeM(id){document.getElementById(id).classList.remove(‘open’);}
function tog(a,b,v){var ea=document.getElementById(a),eb=document.getElementById(b);if(ea)ea.classList.toggle(‘on’,!!v);if(eb)eb.classList.toggle(‘on’,!v);}
function openNewLeague(){_nlType=‘rr’;_nlFmt=‘single’;document.getElementById(‘nl-name’).value=’’;tog(‘nl-rr’,‘nl-br’,true);tog(‘nl-se’,‘nl-de’,true);document.getElementById(‘nl-fmt’).style.display=‘none’;openM(‘m-new’);setTimeout(function(){document.getElementById(‘nl-name’).focus();},60);}
function nlType(t){_nlType=t;tog(‘nl-rr’,‘nl-br’,t===‘rr’);document.getElementById(‘nl-fmt’).style.display=t===‘bracket’?‘block’:‘none’;}
function nlFmt(f){_nlFmt=f;tog(‘nl-se’,‘nl-de’,f===‘single’);}
function confirmNew(){var n=document.getElementById(‘nl-name’).value.trim();if(!n){alert(‘Enter a name.’);return;}CID=mkLeague(n,_nlType,_nlFmt);save();renderDrop();refreshAll();closeM(‘m-new’);}
function openExtModal(){_extFmt=‘single’;document.getElementById(‘ext-name’).value=(L()?L().name+’ Playoffs’:‘Playoffs’);tog(‘ext-se’,‘ext-de’,true);openM(‘m-ext’);}
function extFmt(f){_extFmt=f;tog(‘ext-se’,‘ext-de’,f===‘single’);}
function confirmExt(){var name=document.getElementById(‘ext-name’).value.trim()||‘Playoffs’;var teams=calcStandings().sorted;CID=mkLeague(name,‘bracket’,_extFmt);L().teams=teams.slice();buildBracket(CID);save();renderDrop();refreshAll();closeM(‘m-ext’);showTab(‘bracket’);}
function renderDrop(){var sel=document.getElementById(‘lsel’);sel.innerHTML=Object.keys(DB).map(function(id){var lg=DB[id],p=lg.type===‘bracket’?’[B] ‘:’[RR] ‘;return’<option value=”’+id+’”’+(id===CID?’ selected’:’’)+’>’+p+esc(lg.name)+’</option>’;}).join(’’);var b=document.getElementById(‘tbdg’);if(L())b.textContent=L().type===‘bracket’?(L().format===‘double’?‘2xElim’:‘Bracket’):‘RR’;}
function buildTabs(){var bar=document.getElementById(‘tabbar’);if(L()&&L().type===‘rr’){bar.innerHTML=’<button class="tab" id="tb-setup" onclick="showTab(\'setup\')">Setup</button><button class="tab" id="tb-schedule" onclick="showTab(\'schedule\')">Schedule</button><button class="tab" id="tb-standings" onclick="showTab(\'standings\')">Standings</button><button class="tab" id="tb-ext" onclick="openExtModal()" style="border-left:1px solid rgba(255,255,255,.18);margin-left:.3rem">→ Bracket</button>’;}else{bar.innerHTML=’<button class="tab" id="tb-setup" onclick="showTab(\'setup\')">Setup</button><button class="tab" id="tb-bracket" onclick="showTab(\'bracket\')">Bracket</button>’;}}
function showTab(t){document.querySelectorAll(’.tab’).forEach(function(x){x.classList.remove(‘active’);});document.querySelectorAll(’.view’).forEach(function(x){x.classList.remove(‘active’);});var tb=document.getElementById(‘tb-’+t);if(tb)tb.classList.add(‘active’);var vw=document.getElementById(‘view-’+t);if(vw)vw.classList.add(‘active’);if(t===‘setup’)renderSetup();if(t===‘schedule’)renderSchedule();if(t===‘standings’)renderStandings();if(t===‘bracket’)renderBracket();}
function refreshAll(){renderDrop();buildTabs();showTab(‘setup’);}
function renderSetup(){var el=document.getElementById(‘view-setup’),lg=L();if(!lg){el.innerHTML=’’;return;}var isBr=lg.type===‘bracket’;var html=’<div class="ptitle">’+esc(lg.name)+’</div>’;html+=’<div class="card"><div class="ch">League Name</div><input type="text" id="tname" value="'+esc(lg.name)+'" style="width:100%" oninput="saveName()"></div><div class="card"><div class="ch">Teams’+(isBr?’ <span style="font-size:.7rem;font-weight:400;color:var(--muted)">(add in seed order)</span>’:’’)+’</div><div class="irow"><input type="text" id="ti" placeholder="Team name..." onkeydown="if(event.key===\'Enter\')addTeam()"><button class="btn ba" onclick="addTeam()">Add</button></div><div id="tlist"></div></div><button class="btn ba" onclick="'+(isBr?'generateBracket':'generateSchedule')+'()" style="padding:.52rem 1.4rem">’+(isBr?‘Generate Bracket’:‘Generate Schedule’)+’ →</button> <span id="tcmsg" style="font-size:.77rem;color:var(--muted);margin-left:.3rem"></span>’;el.innerHTML=html;renderTeamList();}
function saveName(){if(!L())return;var el=document.getElementById(‘tname’);if(el){L().name=el.value;save();renderDrop();}}
function addTeam(){var el=document.getElementById(‘ti’);if(!el||!L())return;var name=el.value.trim();if(!name)return;if(L().teams.some(function(t){return t.toLowerCase()===name.toLowerCase();})){el.style.borderColor=‘var(–loss)’;setTimeout(function(){el.style.borderColor=’’;},1000);return;}L().teams.push(name);el.value=’’;save();renderTeamList();}
function removeTeam(i){if(!L())return;L().teams.splice(i,1);save();renderTeamList();}
function moveTeam(i,d){var t=L().teams,j=i+d;if(j<0||j>=t.length)return;var x=t[i];t[i]=t[j];t[j]=x;save();renderTeamList();}
function renderTeamList(){var el=document.getElementById(‘tlist’),msg=document.getElementById(‘tcmsg’);if(!el)return;var teams=L()?L().teams:[],isBr=L()&&L().type===‘bracket’;el.innerHTML=teams.map(function(t,i){var s=’<span class="chip">’;if(isBr)s+=’<span class="sdlbl">#’+(i+1)+’</span>’;s+=esc(t);if(isBr&&teams.length>1)s+=’<button onclick="moveTeam('+i+',-1)">▲</button><button onclick="moveTeam('+i+',1)">▼</button>’;s+=’<button onclick="removeTeam('+i+')">×</button></span>’;return s;}).join(’’);var n=teams.length;if(msg)msg.textContent=n<2?(n===0?’’:‘Need at least 2 teams’):(isBr?n+’ teams’:n+’ teams · ’+(n*(n-1)/2)+’ games’);}

// BRACKET ENGINE
// Play-in approach: mainSz = largest power-of-2 <= N
// playIns = N - mainSz extra teams play in R0, winners fill bottom seeds
// Main bracket is ALWAYS clean power-of-2 → hardcoded DE tables always work
// ═══════════════════════════════════════════════════════════════════════

function p2down(n){// largest power of 2 <= n
var x=1;while(x*2<=n)x*=2;return x;
}
function seedSlots(sz){
if(sz===1)return[1];
var p=seedSlots(sz/2),o=[];
for(var i=0;i<p.length;i++){o.push(p[i]);o.push(sz+1-p[i]);}
return o;
}
function newSlot(name,isBye){return{name:name||(isBye?‘BYE’:‘TBD’),bye:!!isBye,seed:null};}
function newMatch(tN,tB,bN,bB){
var m={id:_GID++,top:newSlot(tN,tB),bot:newSlot(bN,bB),winner:null};
autoWin(m);return m;
}
function autoWin(m){
if(m.winner)return;
if(m.top.bye&&!m.bot.bye&&real(m.bot.name))m.winner=m.bot.name;
else if(m.bot.bye&&!m.top.bye&&real(m.top.name))m.winner=m.top.name;
else if(m.top.bye&&m.bot.bye)m.winner=‘BYE’;
}

function buildBracket(lid){
var lg=DB[lid],teams=lg.teams.slice(),N=teams.length;
if(N<2)return;

// mainSz = largest power-of-2 <= N
// playIns = N - mainSz  (how many play-in games needed)
// Play-in pairs: bottom seeds play for the last mainSz slots
// e.g. N=17, mainSz=16, playIns=1 → seeds 16 & 17 play in for seed-16 slot
// e.g. N=20, mainSz=16, playIns=4 → pairs: (13,20),(14,19),(15,18),(16,17)
var mainSz=p2down(N);
var playIns=N-mainSz; // number of play-in games (= number of extra teams)

// Main bracket seeds 1..mainSz
// Seeds (mainSz-playIns+1)..mainSz are TBD until play-in resolved
// Seeds 1..(mainSz-playIns) go straight into main bracket R1

// Play-in matches: pair lowest seeds
// playInMatches[i]: seeds (mainSz-playIns+1+i) vs (N-i)  for i=0..playIns-1
// winner takes seed slot (mainSz-playIns+1+i) in main bracket
var playInMatches=[];
for(var i=0;i<playIns;i++){
var sA=mainSz-playIns+1+i; // e.g. for N=17,mainSz=16,playIns=1: sA=16
var sB=N-i;                 // e.g. sB=17
var tA=teams[sA-1],tB=teams[sB-1];
var pm=newMatch(tA,false,tB,false);
pm.top.seed=sA; pm.bot.seed=sB;
pm.playInSeed=sA; // winner fills this seed in main bracket
playInMatches.push(pm);
}

// Build main bracket R1 using seeds 1..mainSz
// For seed slots that have a play-in, use winner of play-in (TBD until played)
var slots=seedSlots(mainSz);
var wR1=[];
for(var i=0;i<slots.length;i+=2){
var s1=slots[i],s2=slots[i+1];
// Get team name for this seed - if it’s a play-in seed, use TBD initially
var t1=getMainSeedName(teams,mainSz,playIns,s1,playInMatches);
var t2=getMainSeedName(teams,mainSz,playIns,s2,playInMatches);
var m=newMatch(t1,false,t2,false);
m.top.seed=s1; m.bot.seed=s2;

wR1.push(m);

rnd.push(newMatch(w1,w1===‘BYE’,w2,w2===‘BYE’));
}
wRounds.push(rnd);
}

if(lg.format===‘double’){
var tbl=DE_TABLES[mainSz];
if(!tbl){alert(‘Double elimination supports up to 32 teams (use up to 32).’);lg.format=‘single’;lg.bk=bk;return;}

function getMainSeedName(teams,mainSz,playIns,seed,playInMatches){
// Seeds 1..(mainSz-playIns) go directly
if(seed<=mainSz-playIns) return teams[seed-1];
// Seeds (mainSz-playIns+1)..mainSz are filled by play-in winners
// Find the play-in match for this seed
for(var i=0;i<playInMatches.length;i++){
if(playInMatches[i].playInSeed===seed){
return playInMatches[i].winner||‘TBD’;
}
}
return’TBD’;
}

function getPlayInIdx(mainSz,playIns,seed){
if(seed<mainSz-playIns+1) return -1;
return seed-(mainSz-playIns+1);
}

// ── Slot helpers ───────────────────────────────────────────────────────────────
function putSlot(m,slot,nn,on){
if(!m)return;
if(on){if(m[slot].name===on){m[slot].name=nn||‘TBD’;if(m.winner===on)m.winner=null;}}
else if(m[slot].name===‘TBD’)m[slot].name=nn||‘TBD’;
}
function tryAuto(m){
if(m.winner)return false;
if(m.top.bye&&real(m.bot.name)){m.winner=m.bot.name;return true;}
if(m.bot.bye&&real(m.top.name)){m.winner=m.top.name;return true;}
return false;
}

function wLoserDest(bk,wRi,wMi){
var tbl=DE_TABLES[bk.sz];if(!tbl)return null;
var wd=tbl.wDrops[wRi];if(!wd)return null;
if(wd.mapping===‘paired’){
var p=(bk.wR1RealIdx||[]).indexOf(wMi);
if(p<0)return null;
return{lri:wd.lri,lmi:Math.floor(p/2),slot:p%2===0?‘top’:‘bot’};
}
return{lri:wd.lri,lmi:wMi,slot:wd.slot||‘top’};
}

function lWinnerDest(bk,lri,lmi){
var tbl=DE_TABLES[bk.sz];if(!tbl)return’gf’;
var adv=tbl.lbAdvance[lri];
if(!adv||adv===‘gf’)return’gf’;
if(adv.mapping===‘direct’)return{lri:adv.lri,lmi:lmi,slot:adv.slot};
if(adv.mapping===‘paired’)return{lri:adv.lri,lmi:Math.floor(lmi/2),slot:lmi%2===0?‘top’:‘bot’};
return’gf’;
}

function placeL(bk,dest,nn,on){
if(!dest||dest===‘gf’)return;
var m=bk.lRounds[dest.lri]&&bk.lRounds[dest.lri].matches[dest.lmi];
if(!m)return;
putSlot(m,dest.slot,nn,on);
if(on&&m.winner===on){m.winner=null;clearLdn(bk,dest.lri,dest.lmi,on);}
if(tryAuto(m))fwdL(bk,dest.lri,dest.lmi,m.winner,null);
}

function gfSetSlot(gf,slot,nn,on){
if(on&&gf.g1[slot].name===on){
gf.g1[slot].name=nn||‘TBD’;
if(gf.g1.winner===on){gf.g1.winner=null;gf.g2Active=false;gf.g2.top.name=‘TBD’;gf.g2.bot.name=‘TBD’;gf.g2.winner=null;}
} else if(!on&&gf.g1[slot].name===‘TBD’){
gf.g1[slot].name=nn||‘TBD’;
}
}

function fwdL(bk,lri,lmi,nn,on){
var dest=lWinnerDest(bk,lri,lmi);
if(!dest||dest===‘gf’){gfSetSlot(bk.gf,‘bot’,nn,on);return;}
var m=bk.lRounds[dest.lri]&&bk.lRounds[dest.lri].matches[dest.lmi];
if(!m)return;
putSlot(m,dest.slot,nn,on);
if(on&&m.winner===on){m.winner=null;clearLdn(bk,dest.lri,dest.lmi,on);}
if(tryAuto(m))fwdL(bk,dest.lri,dest.lmi,m.winner,null);
}

function clearLdn(bk,lri,lmi,name){
if(!real(name))return;
fwdL(bk,lri,lmi,null,name);
}

if(game===‘g1’){
if(g.winner===g.bot.name&&real(g.bot.name)){gf.g2Active=true;gf.g2.top.name=g.top.name;gf.g2.bot.name=g.bot.name;gf.g2.winner=null;}
else{gf.g2Active=false;gf.g2.top.name=‘TBD’;gf.g2.bot.name=‘TBD’;gf.g2.winner=null;}
}
save();var s=snapScrolls();renderBracket();restoreScrolls(s);
}

function generateBracket(){if(!L())return;if((L().teams||[]).length<2){alert(‘Add at least 2 teams.’);return;}buildBracket(CID);save();showTab(‘bracket’);}

// ═══════════════════════════════════════
// SVG BRACKET RENDERER
// ═══════════════════════════════════════
var SH=42,RW=170,CW=36,PL=10,PT=26,SR=5;
var CLR={
winBg:’#1a5fb4’,winText:’#ffffff’,winBdr:’#0d3d7c’,
loseBg:’#e8f0f8’,loseText:’#8aaacf’,loseBdr:’#c0d4ea’,
normalBg:’#ffffff’,normalText:’#0f1f3d’,normalBdr:’#a0c0e8’,
tbdBg:’#f4f7fb’,tbdText:’#b0c4dc’,tbdBdr:’#ccd9e8’,
byeBg:’#f0f4f8’,byeText:’#c0cfe0’,byeBdr:’#dce8f0’,
hoverBg:’#ddeaf8’,connector:’#a0c0e8’,winCheck:’#f97316’
};
function esc2(s){return String(s||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’);}
function fitName(name,maxPx,fontSize){var cw=fontSize*0.58,mc=Math.floor(maxPx/cw);if(name.length<=mc)return name;return name.substring(0,mc-2)+’…’;}
function slotState(m,slot){var sl=m[slot],tn=sl.name||‘TBD’;if(sl.bye||tn===‘BYE’)return’bye’;if(!real(tn))return’tbd’;if(m.winner===tn)return’win’;if(m.winner&&real(tn))return’lose’;return’normal’;}

function renderBracket(){
var el=document.getElementById(‘view-bracket’),lg=L();if(!lg){el.innerHTML=’’;return;}
var bk=lg.bk;if(!bk){el.innerHTML=’<div class="empty">Generate a bracket from Setup first.</div>’;return;}
var champ=null;
if(bk.format===‘single’){var last=bk.wRounds[bk.wRounds.length-1];if(last&&last[0]&&real(last[0].winner))champ=last[0].winner;}
else if(bk.gf){var gf=bk.gf;if(gf.g1.winner===gf.g1.top.name&&real(gf.g1.winner))champ=gf.g1.winner;else if(gf.g2Active&&real(gf.g2.winner))champ=gf.g2.winner;}
var lid=CID,html=’<div class="ptitle">’+esc(lg.name)+’</div>’;
if(champ)html+=’<div class="champ"><div class="champ-icon">🏆</div><div class="champ-lbl">CHAMPION</div><div class="champ-name">’+esc(champ)+’</div></div>’;
html+=’<div class="bk-legend">’
+’<div class="bk-legend-item"><div class="bk-legend-swatch" style="background:'+CLR.winBg+';border-color:'+CLR.winBdr+'"></div>Winner</div>’
+’<div class="bk-legend-item"><div class="bk-legend-swatch" style="background:'+CLR.loseBg+';border-color:'+CLR.loseBdr+'"></div>Eliminated</div>’
+’<div class="bk-legend-item"><div class="bk-legend-swatch" style="background:'+CLR.normalBg+';border-color:'+CLR.normalBdr+'"></div>Pending</div>’
+’</div>’;
// Play-in round
if(bk.playInMatches&&bk.playInMatches.length){
html+=’<div class="bk-section"><div class="bk-sec-lbl">PLAY-IN ROUND</div><div class="bk-scroll">’+buildPIsvg(bk,lid)+’</div></div>’;
}
html+=’<div class="bk-section"><div class="bk-sec-lbl">’+(bk.format===‘double’?‘WINNERS BRACKET’:‘BRACKET’)+’</div><div class="bk-scroll">’+buildWsvg(bk,lid)+’</div></div>’;
if(bk.format===‘double’&&bk.lRounds&&bk.lRounds.length){
html+=’<div class="bk-section"><div class="bk-sec-lbl">LOSERS BRACKET</div><div class="bk-scroll">’+buildLsvg(bk,lid)+’</div></div>’;
html+=’<div class="bk-section"><div class="bk-sec-lbl">GRAND FINAL</div>’+buildGFhtml(bk,lid)+’</div>’;
}
el.innerHTML=html;
}

function buildPIsvg(bk,lid){
var pms=bk.playInMatches,n=pms.length;
var svgH=PT+n*2*SH+10,svgW=PL+RW+CW;
var s=’<svg width="'+svgW+'" height="'+svgH+'" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:'+svgW+'px">’;
s+=’<text font-family="Bebas Neue,sans-serif" font-size="11" fill="#4a6fa8" letter-spacing="1.5" x="'+PL+'" y="16">Play-In</text>’;
for(var i=0;i<n;i++){
var m=pms[i],topY=PT+i*2*SH,botY=topY+SH;
var canClick=real(m.top.name)&&real(m.bot.name);
s+=drawSlotPill(m,‘top’,PL,topY,RW,SH,lid,i,i,‘PI’,i+1,canClick);
s+=drawSlotPill(m,‘bot’,PL,botY,RW,SH,lid,i,i,‘PI’,i+1,canClick);
var rx=PL+RW+1,topMid=topY+SH/2,botMid=botY+SH/2;
s+=’<line stroke="'+CLR.connector+'" stroke-width="1.5" x1="'+rx+'" y1="'+topMid+'" x2="'+rx+'" y2="'+botMid+'"/>’;
}
return s+’</svg>’;
}

function calcWPos(rounds){
// Compute match Y positions propagating from R0 outward
var nFirst=rounds[0].length,mPos=[];
var r0=[];
for(var i=0;i<nFirst;i++) r0.push({topY:PT+i*2*SH,botY:PT+i*2*SH+SH});
mPos.push(r0);
for(var r=1;r<rounds.length;r++){
var prev=mPos[r-1],rr=[];
for(var i=0;i<rounds[r].length;i++){
var fA=prev[i*2],fB=prev[i*2+1]||fA;
var midA=(fA.topY+SH/2+fA.botY+SH/2)/2;
var midB=(fB.topY+SH/2+fB.botY+SH/2)/2;
var c=(midA+midB)/2;
rr.push({topY:c-SH,botY:c});
}
mPos.push(rr);
}
return mPos;
}

function buildWsvg(bk,lid){
var rounds=bk.wRounds,nR=rounds.length;
var mPos=calcWPos(rounds);
var maxY=0;
for(var r=0;r<nR;r++) for(var i=0;i<mPos[r].length;i++) maxY=Math.max(maxY,mPos[r][i].botY+SH);
var svgH=maxY+10,svgW=PL+nR*(RW+CW)+CW;
var s=’<svg width="'+svgW+'" height="'+svgH+'" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:'+svgW+'px">’;
var mNum=1;
for(var r=0;r<nR;r++){
var x=PL+r*(RW+CW),nM=rounds[r].length;
var fe=nR-1-r,rlbl=fe===0?‘Championship’:fe===1?‘Semifinals’:fe===2?‘Quarterfinals’:‘Round ‘+(r+1);
s+=’<text font-family="Bebas Neue,sans-serif" font-size="11" fill="#4a6fa8" letter-spacing="1.5" x="'+x+'" y="16">’+rlbl+’</text>’;
for(var mi=0;mi<nM;mi++){
var m=rounds[r][mi],pos=mPos[r][mi];
var topY=pos.topY,botY=pos.botY,topMid=topY+SH/2,botMid=botY+SH/2,matchMid=(topMid+botMid)/2;
var canClick=real(m.top.name)&&real(m.bot.name)&&!m.top.bye&&!m.bot.bye;
s+=drawSlotPill(m,‘top’,x,topY,RW,SH,lid,r,mi,‘W’,mNum,canClick);
s+=drawSlotPill(m,‘bot’,x,botY,RW,SH,lid,r,mi,‘W’,mNum,canClick);
var rx=x+RW+1;
s+=’<line stroke="'+CLR.connector+'" stroke-width="1.5" x1="'+rx+'" y1="'+topMid+'" x2="'+rx+'" y2="'+botMid+'"/>’;
if(r<nR-1){
var nextPos=mPos[r+1][Math.floor(mi/2)];
var nextSlotMid=(mi%2===0?nextPos.topY:nextPos.botY)+SH/2;
s+=’<line stroke="'+CLR.connector+'" stroke-width="1.5" x1="'+rx+'" y1="'+matchMid+'" x2="'+(rx+CW-1)+'" y2="'+matchMid+'"/>’;
if(Math.abs(matchMid-nextSlotMid)>1)
s+=’<line stroke="'+CLR.connector+'" stroke-width="1.5" x1="'+(rx+CW-1)+'" y1="'+matchMid+'" x2="'+(rx+CW-1)+'" y2="'+nextSlotMid+'"/>’;
}
mNum++;
}
}
return s+’</svg>’;
}

function drawSlotPill(m,slot,x,y,w,h,lid,ri,mi,type,num,canClick){
var sl=m[slot],tn=sl.name||‘TBD’,isBye=sl.bye||(tn===‘BYE’);
var state=slotState(m,slot);
var pad=4,px=x+pad,py=y+pad,pw=w-pad*2,ph=h-pad*2;
var bg,tc,bc,dashArr=‘none’;
if(state===‘win’)      {bg=CLR.winBg;   tc=CLR.winText;  bc=CLR.winBdr;}
else if(state===‘lose’){bg=CLR.loseBg;  tc=CLR.loseText; bc=CLR.loseBdr;}
else if(state===‘tbd’) {bg=CLR.tbdBg;   tc=CLR.tbdText;  bc=CLR.tbdBdr;dashArr=‘4,3’;}
else if(state===‘bye’) {bg=CLR.byeBg;   tc=CLR.byeText;  bc=CLR.byeBdr;}
else                   {bg=CLR.normalBg;tc=CLR.normalText;bc=CLR.normalBdr;}
var fn=type===‘W’?‘clickW’:(type===‘PI’?‘clickPI’:‘clickL’);
var oc=canClick?’ onclick=”’+fn+’('’+lid+’',’+ri+’,’+mi+’,'’+slot+’')”’
+’ onmouseenter=“this.querySelector('rect.pill').setAttribute('fill','’+(state===‘normal’?CLR.hoverBg:bg)+’')”’
+’ onmouseleave=“this.querySelector('rect.pill').setAttribute('fill','’+bg+’')”’:’’;
var out=’<g style=“cursor:’+(canClick?‘pointer’:‘default’)+’”’+oc+’>’;
out+=’<rect class=“pill” x=”’+px+’” y=”’+py+’” width=”’+pw+’” height=”’+ph+’” rx=”’+SR+’” ry=”’+SR+’” fill=”’+bg+’” stroke=”’+bc+’” stroke-width=“1.5”’+(dashArr!==‘none’?’ stroke-dasharray=”’+dashArr+’”’:’’)+’/>’;
var textX=px+8;
if(sl.seed&&!isBye){
out+=’<rect x="'+(px+4)+'" y="'+(py+3)+'" width="16" height="13" rx="3" fill="rgba(0,0,0,0.08)"/>’;
out+=’<text font-family="DM Sans,sans-serif" font-size="8" fill="'+tc+'" font-weight="700" x="'+(px+12)+'" y="'+(py+13)+'" text-anchor="middle">’+sl.seed+’</text>’;
textX=px+24;
}
var nameMaxW=pw-(textX-px)-(state===‘win’?20:8);
var dispName=isBye?‘BYE’:(tn===‘TBD’?‘TBD’:tn);
var dispFit=fitName(dispName,nameMaxW,11);
var nameY=py+ph/2+4;
out+=’<text font-family="DM Sans,sans-serif" font-size="11" fill="'+tc+'" font-weight="'+(state==='win'?'700':'500')+'" x="'+textX+'" y="'+nameY+'" font-style="'+(state==='tbd'?'italic':'normal')+'">’+esc2(dispFit)+’</text>’;
if(state===‘lose’)out+=’<line stroke="'+tc+'" stroke-width="1" x1="'+textX+'" y1="'+(nameY-4)+'" x2="'+(textX+dispFit.length*6.4)+'" y2="'+(nameY-4)+'"/>’;
if(state===‘win’)out+=’<text font-family="DM Sans,sans-serif" font-size="12" fill="'+CLR.winCheck+'" x="'+(px+pw-6)+'" y="'+nameY+'" text-anchor="end" font-weight="700">✓</text>’;
if(slot===‘top’){var numStr=type===‘W’?String(num):‘L’+num;out+=’<text font-family="Bebas Neue,sans-serif" font-size="9" fill="#f97316" x="'+(x+w-2)+'" y="'+(y+10)+'" text-anchor="end">#’+numStr+’</text>’;}
return out+’</g>’;
}

function buildLsvg(bk,lid){
if(!bk.lRounds||!bk.lRounds.length)return’<p style="padding:.5rem;color:var(--muted);font-size:.8rem">No losers bracket yet.</p>’;
// Only show rounds that have at least one non-bye match
var vis=[];
bk.lRounds.forEach(function(r,lri){
var vm=r.matches.filter(function(m){return!m.top.bye||!m.bot.bye;});
if(vm.length) vis.push({r:r,lri:lri,vm:vm});
});
if(!vis.length)return’<p style="padding:.5rem;color:var(--muted);font-size:.8rem">Losers bracket fills in as results are entered.</p>’;

var nR=vis.length;
// Compute Y positions from col 0 outward
var mPos=[];
var c0=vis[0].vm;
var r0=[];
for(var j=0;j<c0.length;j++) r0.push({topY:PT+j*2*SH,botY:PT+j*2*SH+SH});
mPos.push(r0);
for(var i=1;i<nR;i++){
var prev=mPos[i-1],nM=vis[i].vm.length,rr=[];
if(nM===prev.length){
for(var j=0;j<nM;j++){
var pm=prev[j],c=(pm.topY+SH/2+pm.botY+SH/2)/2;
rr.push({topY:c-SH,botY:c});
}
} else {
for(var j=0;j<nM;j++){
var fA=prev[j*2]||prev[prev.length-1],fB=prev[j*2+1]||fA;
var midA=(fA.topY+SH/2+fA.botY+SH/2)/2,midB=(fB.topY+SH/2+fB.botY+SH/2)/2;
var c=(midA+midB)/2;
rr.push({topY:c-SH,botY:c});
}
}
mPos.push(rr);
}

var maxY=0;
for(var i=0;i<nR;i++) for(var j=0;j<mPos[i].length;j++) maxY=Math.max(maxY,mPos[i][j].botY+SH);
var svgH=maxY+10,svgW=PL+nR*(RW+CW)+CW;
var s=’<svg width="'+svgW+'" height="'+svgH+'" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:'+svgW+'px">’;
var lNum=1;
for(var i=0;i<nR;i++){
var vr=vis[i],lri=vr.lri,vm=vr.vm,x=PL+i*(RW+CW),nM=vm.length;
s+=’<text font-family="Bebas Neue,sans-serif" font-size="11" fill="#4a6fa8" letter-spacing="1.5" x="'+x+'" y="16">’+esc2(vr.r.label)+’</text>’;
for(var j=0;j<nM;j++){
var m=vm[j],lmi=vr.r.matches.indexOf(m);
var pos=mPos[i][j];
var topY=pos.topY,botY=pos.botY,topMid=topY+SH/2,botMid=botY+SH/2,matchMid=(topMid+botMid)/2;
var canClick=real(m.top.name)&&real(m.bot.name)&&!m.top.bye&&!m.bot.bye;
s+=drawSlotPill(m,‘top’,x,topY,RW,SH,lid,lri,lmi,‘L’,lNum,canClick);
s+=drawSlotPill(m,‘bot’,x,botY,RW,SH,lid,lri,lmi,‘L’,lNum,canClick);
var rx=x+RW+1;
s+=’<line stroke="'+CLR.connector+'" stroke-width="1.5" x1="'+rx+'" y1="'+topMid+'" x2="'+rx+'" y2="'+botMid+'"/>’;
if(i<nR-1){
var nextNM=vis[i+1].vm.length;
var nextJ=nextNM===nM?j:Math.floor(j/2);
var nextPos=mPos[i+1][Math.min(nextJ,mPos[i+1].length-1)];
var nextSlotMid=(nextNM===nM||j%2===0?nextPos.topY:nextPos.botY)+SH/2;
s+=’<line stroke="'+CLR.connector+'" stroke-width="1.5" x1="'+rx+'" y1="'+matchMid+'" x2="'+(rx+CW-1)+'" y2="'+matchMid+'"/>’;
if(Math.abs(matchMid-nextSlotMid)>1)
s+=’<line stroke="'+CLR.connector+'" stroke-width="1.5" x1="'+(rx+CW-1)+'" y1="'+matchMid+'" x2="'+(rx+CW-1)+'" y2="'+nextSlotMid+'"/>’;
}
lNum++;
}
}
return s+’</svg>’;
}

function buildGFhtml(bk,lid){
var gf=bk.gf;if(!gf)return’’;
var g1=gf.g1,g2=gf.g2,html=’<div class="gf-wrap"><div class="gf-title">🏆 Grand Final</div><div class="gf-game-lbl">GAME 1</div>’;
[‘top’,‘bot’].forEach(function(side){
var sl=g1[side],tn=sl.name||‘TBD’,isW=g1.winner===tn&&real(tn),done=!!g1.winner;
var cls=isW?‘win’:(done&&real(tn)?‘lose’:(!real(tn)?‘tbd’:’’));
var badge=side===‘top’?‘W Bracket’:‘L Bracket’;
var can=real(g1.top.name)&&real(g1.bot.name);
html+=’<div class=“gf-slot ‘+cls+’”’+(can?’ onclick=“clickGF('’+lid+’','g1','’+side+’')”’:’’)+’>’+esc(tn)+(isW?’ ✓’:’’)+’ <span class="gf-badge">’+badge+’</span></div>’;
});
if(gf.g2Active||(g1.winner&&g1.winner===g1.bot.name)){
html+=’<div class="gf-reset-note" style="margin-top:.6rem">⚠ Bracket Reset — W bracket champion must lose twice to be eliminated</div><div class="gf-game-lbl">GAME 2</div>’;
[‘top’,‘bot’].forEach(function(side){
var sl=g2[side],tn=sl.name||‘TBD’,isW=g2.winner===tn&&real(tn),done=!!g2.winner;
var cls=isW?‘win’:(done&&real(tn)?‘lose’:(!real(tn)?‘tbd’:’’));
var can=gf.g2Active&&real(g2.top.name)&&real(g2.bot.name);
html+=’<div class=“gf-slot ‘+cls+(gf.g2Active?’’:’ inactive’)+’”’+(can?’ onclick=“clickGF('’+lid+’','g2','’+side+’')”’:’’)+’>’+esc(tn)+(isW?’ ✓’:’’)+’</div>’;
});
}
return html+’</div>’;
}

function esc(s){if(s==null)return’’;return String(s).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’).replace(/’/g,’'’);}

async function init(){
var loaded=await loadData();
if(!loaded||!Object.keys(DB).length){CID=mkLeague(‘My League’,‘rr’,‘single’);await save();}
if(!DB[CID])CID=Object.keys(DB)[0];
Object.keys(DB).forEach(function(id){
var lg=DB[id];
if(!lg.type){lg.type=‘rr’;lg.format=‘single’;lg.bk=null;}
if(!lg.teams)lg.teams=[];
if(!lg.games)lg.games=[];
if(!lg.rounds)lg.rounds=[];
if(lg.rounds.length&&typeof lg.rounds[0][0]===‘object’)
lg.rounds=lg.rounds.map(function(rnd){return rnd.map(function(g){return g.id;});});
});
renderDrop();buildTabs();showTab(‘setup’);
}
[‘m-new’,‘m-ext’].forEach(function(id){document.getElementById(id).addEventListener(‘click’,function(e){if(e.target===this)closeM(id);});});
init();
</script>
